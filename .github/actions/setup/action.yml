name: 'Checkout and Cache'
description: 'Reusable composite action: checkout repo + restore Node.js dependency cache'

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION || '20' }}

    - name: Restore npm cache
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: cache-${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          cache-${{ runner.os }}-node-

    - name: Install dependencies
      run: npm ci
      shell: bash
