name: CI Pipeline — IAM System

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  IMAGE: ghcr.io/${{ github.repository }}/iam-api

# Cancel any in-progress run on the same ref to save compute
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1. Lint ──────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup
      - name: Run ESLint
        run: npm run lint

  # ── 2. Unit Tests + Coverage ─────────────────────────────────────────
  unit-test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup
      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ── 3. SAST — Semgrep ────────────────────────────────────────────────
  sast-scan:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep (OWASP Top 10 + JWT + Node.js)
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/nodejs
            p/jwt
            p/owasp-top-ten
          generateSarif: '1'
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  # ── 4. Dependency Audit ───────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit (npm audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup
      - name: Audit for HIGH/CRITICAL vulnerabilities
        run: npm audit --audit-level=high

  # ── 5. Docker Build + Push (PR to main only) ─────────────────────────
  build:
    name: Docker Build & Push (GHCR)
    runs-on: ubuntu-latest
    needs: [lint, unit-test, sast-scan, dependency-audit]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      image-tag: ${{ env.IMAGE }}:sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker BuildKit
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (immutable SHA tag)
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true   # enables SPDX SBOM generation

  # ── 6. Container Scan — Trivy ─────────────────────────────────────────
  container-scan:
    name: Container Scan — Trivy
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:sha-${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'   # fails pipeline on any CRITICAL CVE
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()       # upload even on failure so the result is visible
        with:
          sarif_file: trivy.sarif

  # ── 7. Integration Tests (against Postgres service container) ─────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_pw
          POSTGRES_DB: iam_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgres://postgres:test_pw@localhost:5432/iam_test
      JWT_SECRET: test-secret-must-be-at-least-32-chars-long
      JWT_REFRESH_SECRET: test-refresh-secret-at-least-32-chars
      NODE_ENV: test
    steps:
      - uses: ./.github/actions/setup
      - name: Run database migrations
        run: node scripts/migrate.js
      - name: Run integration tests
        run: npm run test:integration

  # ── 8. SBOM Generation ────────────────────────────────────────────────
  sbom-generate:
    name: Generate SBOM (SPDX)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
    steps:
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:sha-${{ github.sha }}
          artifact-name: sbom-${{ github.sha }}.spdx
          format: spdx-json
